<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>

    <!-- Glowing Effects -->
    <radialGradient id="glowPix" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00bfa5" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00bfa5" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowJava" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f37021" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#f37021" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowSuccess" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00e676" stop-opacity="0" />
    </radialGradient>

    <!-- Element Gradients -->
    <linearGradient id="pixGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00bfa5" />
      <stop offset="100%" stop-color="#00e676" />
    </linearGradient>
    <linearGradient id="javaCupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f37021" />
      <stop offset="100%" stop-color="#e76f51" />
    </linearGradient>
    <linearGradient id="javaSteamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0073b7" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#64b5f6" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="1" stroke-opacity="0.5" />
    </pattern>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5" />
    </filter>
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="url(#grid)" />

  <!-- Neon Glowing Background Orbs -->
  <circle cx="200" cy="250" r="180" fill="url(#glowJava)" />
  <circle cx="600" cy="250" r="220" fill="url(#glowPix)" />
  <circle cx="400" cy="250" r="150" fill="url(#glowSuccess)" />

  <!-- Code Line Visual Elements in Background -->
  <g opacity="0.15" font-family="monospace" font-size="12" fill="#64b5f6">
    <text x="50" y="80">import java.net.http.HttpClient;</text>
    <text x="50" y="100">import java.net.http.HttpRequest;</text>
    <text x="50" y="120">public class PixIntegrationService {</text>
    <text x="70" y="140">public String generateQrCode(BigDecimal amount) {</text>
    <text x="90" y="160">Map&lt;String, Object&gt; payload = new HashMap&lt;&gt;();</text>
    <text x="90" y="180">payload.put("calendario", Map.of("expiracao", 3600));</text>
    <text x="90" y="200">payload.put("valor", Map.of("original", amount.toString()));</text>
    <text x="90" y="220">return this.webmaniaClient.post("/pix", payload);</text>
    <text x="70" y="240">}</text>
    <text x="50" y="260">}</text>
  </g>

  <!-- Connection / Data Flow Lines -->
  <g fill="none" stroke-linecap="round">
    <!-- Line from DB to Java -->
    <path d="M 200 370 C 200 300, 200 300, 200 240" stroke="#4f46e5" stroke-dasharray="5,5" stroke-width="2" />
    <!-- Line from Java to Pix -->
    <path d="M 280 200 C 350 200, 450 250, 520 250" stroke="url(#pixGrad)" stroke-width="3" filter="url(#glowFilter)" stroke-dasharray="10, 5" />
    <path d="M 280 200 C 350 200, 450 250, 520 250" stroke="#fff" stroke-width="1" stroke-opacity="0.8" />
  </g>

  <!-- DATABASE (PostgreSQL) CONTAINER -->
  <g transform="translate(150, 330)" filter="url(#shadow)">
    <!-- DB Label -->
    <text x="50" y="110" font-family="sans-serif" font-size="12" font-weight="bold" fill="#64b5f6" letter-spacing="1" text-anchor="middle">POSTGRESQL</text>
    <!-- DB Icon Drawing -->
    <g transform="translate(20, 0)">
      <!-- Top Cylinder -->
      <path d="M 10 20 C 10 10, 50 10, 50 20 C 50 30, 10 30, 10 20 Z" fill="url(#dbGrad)" />
      <!-- Middle Cylinder -->
      <path d="M 10 20 L 10 45 C 10 55, 50 55, 50 45 L 50 20" fill="none" stroke="url(#dbGrad)" stroke-width="2" />
      <path d="M 10 45 C 10 35, 50 35, 50 45" fill="none" stroke="url(#dbGrad)" stroke-width="2" />
      <!-- Bottom Cylinder -->
      <path d="M 10 45 L 10 70 C 10 80, 50 80, 50 70 L 50 45" fill="none" stroke="url(#dbGrad)" stroke-width="2" />
      <path d="M 10 70 C 10 60, 50 60, 50 70" fill="none" stroke="url(#dbGrad)" stroke-width="2" />
      <!-- Inner Lines/Glow -->
      <ellipse cx="30" cy="20" rx="20" ry="5" fill="#a5f3fc" opacity="0.3" />
      <ellipse cx="30" cy="45" rx="20" ry="5" fill="#a5f3fc" opacity="0.1" />
      <ellipse cx="30" cy="70" rx="20" ry="5" fill="#a5f3fc" opacity="0.1" />
    </g>
  </g>

  <!-- JAVA ENGINE CONTAINER -->
  <g transform="translate(140, 100)" filter="url(#shadow)">
    <!-- Card Base -->
    <rect width="120" height="150" rx="12" fill="#1f2937" stroke="#374151" stroke-width="2" />
    <!-- Java Text -->
    <text x="60" y="130" font-family="sans-serif" font-weight="bold" font-size="14" fill="#f37021" letter-spacing="2" text-anchor="middle">JAVA</text>
    
    <!-- Java Logo Cup Shape -->
    <g transform="translate(30, 20)">
      <!-- Steaming lines -->
      <path d="M 25 15 C 23 5, 29 5, 27 -5" fill="none" stroke="url(#javaSteamGrad)" stroke-width="3" stroke-linecap="round" />
      <path d="M 33 15 C 31 3, 37 3, 35 -7" fill="none" stroke="url(#javaSteamGrad)" stroke-width="3" stroke-linecap="round" />
      <path d="M 41 17 C 39 8, 45 8, 43 -2" fill="none" stroke="url(#javaSteamGrad)" stroke-width="3" stroke-linecap="round" />
      <!-- Cup body -->
      <path d="M 12 25 C 12 25, 12 55, 42 55 C 72 55, 72 25, 72 25 Z" fill="url(#javaCupGrad)" />
      <!-- Handle -->
      <path d="M 72 32 C 82 32, 85 45, 71 47" fill="none" stroke="#e76f51" stroke-width="5" stroke-linecap="round" />
      <!-- Plate -->
      <ellipse cx="42" cy="61" rx="35" ry="6" fill="#f37021" />
    </g>
  </g>

  <!-- PIX PAYMENT GATEWAY CONTAINER -->
  <g transform="translate(520, 150)" filter="url(#shadow)">
    <!-- Card Base -->
    <rect width="180" height="180" rx="16" fill="#111827" stroke="#00bfa5" stroke-width="2" />
    
    <!-- Pix Logo Symbol -->
    <g transform="translate(50, 30)">
      <!-- Pix rhombus lines -->
      <path d="M 40 0 L 80 25 L 40 50 L 0 25 Z" fill="none" stroke="url(#pixGrad)" stroke-width="6" stroke-linejoin="round" />
      <path d="M 40 8 L 68 25 L 40 42 L 12 25 Z" fill="url(#pixGrad)" opacity="0.2" />
      <path d="M 40 16 L 56 25 L 40 34 L 24 25 Z" fill="url(#pixGrad)" />
    </g>
    
    <!-- Pix Text -->
    <text x="90" y="115" font-family="sans-serif" font-weight="bold" font-size="18" fill="#00bfa5" letter-spacing="3" text-anchor="middle">PIX</text>
    <text x="90" y="145" font-family="sans-serif" font-weight="bold" font-size="12" fill="#fff" opacity="0.6" letter-spacing="1" text-anchor="middle">INTEGRADO SEFAZ</text>
  </g>

  <!-- STATUS/SUCCESS SEAL IN CENTER -->
  <g transform="translate(350, 200)" filter="url(#shadow)">
    <!-- Glowing Ring -->
    <circle cx="50" cy="50" r="45" fill="#111827" stroke="#00e676" stroke-width="3" filter="url(#glowFilter)" />
    <!-- Outer dashed/tech ring -->
    <circle cx="50" cy="50" r="38" fill="none" stroke="#00bfa5" stroke-width="1.5" stroke-dasharray="6,4" />
    <!-- Solid Seal -->
    <circle cx="50" cy="50" r="30" fill="url(#pixGrad)" />
    <!-- Checkmark Path -->
    <path d="M 38 50 L 46 58 L 62 42" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Text badge floating underneath -->
    <rect x="5" y="95" width="90" height="24" rx="12" fill="#00e676" />
    <text x="50" y="111" font-family="sans-serif" font-weight="bold" font-size="10" fill="#000" letter-spacing="1.5" text-anchor="middle">APROVADO</text>
  </g>
</svg>
